# nginx/default.conf
# Phase 1 (HTTP only) — serves the site over plain HTTP + exposes ACME challenge
# endpoint needed by certbot to get the first SSL certificate.
#
# After running scripts/ssl-init.sh, replace this file with nginx/ssl.conf
# (the ssl-init script does this automatically).
#
# Replace YOUR_DOMAIN with your actual domain everywhere below, OR let
# scripts/ssl-init.sh do the substitution for you.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ACME challenge for Let's Encrypt certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy all other traffic to the PHP/Apache container
    location / {
        proxy_pass         http://eshop_web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # File upload size — raise if you need larger product images
        client_max_body_size 20M;
    }
}
