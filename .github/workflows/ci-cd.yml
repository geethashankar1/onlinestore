name: CI / CD

# ── Triggers ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Registry ───────────────────────────────────────────────────────────────
env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ══════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PHP syntax (all files)
        run: |
          echo "Running PHP syntax check on all .php files…"
          ERROR=0
          while IFS= read -r -d '' file; do
            php -l "$file" || ERROR=1
          done < <(find my_eshop -name "*.php" -print0)
          if [ $ERROR -ne 0 ]; then
            echo "❌ Syntax errors found — fix them before merging."
            exit 1
          fi
          echo "✅ All PHP files passed syntax check."

  # ── 2. Build & push Docker image (main branch only) ──────────────────────
  build:
    name: Build & Push Image
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write          # needed to push to ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Summary
        run: echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
             echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # ── 3. Deploy to production VPS ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production      # triggers environment protection rules if set

    steps:
      - uses: actions/checkout@v4

      # Copy the compose + nginx files to the server so config changes deploy too
      - name: Upload compose & nginx configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host:   ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:    ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: /opt/eshop
          overwrite: true

      # Pull the new image and restart containers
      - name: Rolling deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/eshop

            # Authenticate to ghcr.io using the deploy token stored on the server
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull only the web image (db + nginx stay unchanged unless config differs)
            docker compose -f docker-compose.prod.yml pull web

            # Recreate only changed containers; keep DB running
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images (keep disk tidy)
            docker image prune -f

            echo "✅ Deployment finished: $(date -u)"

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployed to production" >> $GITHUB_STEP_SUMMARY
          echo "- Server: ${{ secrets.SERVER_HOST }}"   >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}"            >> $GITHUB_STEP_SUMMARY
