name: PR Lint Check
# NOTE: Build + deploy is handled by Jenkins (docker-compose.jenkins.yml).
# This workflow only runs a PHP syntax check on pull requests.

on:
  pull_request:
    branches: [main, develop]

# ── Registry ───────────────────────────────────────────────────────────────
env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ══════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PHP syntax (all files)
        run: |
          echo "Running PHP syntax check on all .php files…"
          ERROR=0
          while IFS= read -r -d '' file; do
            php -l "$file" || ERROR=1
          done < <(find my_eshop -name "*.php" -print0)
          if [ $ERROR -ne 0 ]; then
            echo "❌ Syntax errors found — fix them before merging."
            exit 1
          fi
          echo "✅ All PHP files passed syntax check."

