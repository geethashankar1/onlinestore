# docker-compose.prod.yml — production stack.
# Uses the pre-built image from ghcr.io instead of a local build.
# Required .env variables (create /opt/eshop/.env on the server):
#   WEB_IMAGE, DB_NAME, DB_USER, DB_PASS, DB_ROOT_PASS
#   AUTHNET_* and RAZORPAY_* (optional — payment gateways)

name: eshop_prod

services:

  # ── Nginx reverse proxy + SSL termination ────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: eshop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PHP / Apache app ─────────────────────────────────────────
  web:
    image: ${WEB_IMAGE:-ghcr.io/your-username/onlinestore:latest}
    container_name: eshop_web
    restart: unless-stopped
    expose:
      - "80"           # internal only — Nginx proxies to this
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      # Payment gateways (leave blank to disable their checkout tab)
      AUTHNET_LOGIN_ID:    ${AUTHNET_LOGIN_ID:-}
      AUTHNET_TRANS_KEY:   ${AUTHNET_TRANS_KEY:-}
      AUTHNET_CLIENT_KEY:  ${AUTHNET_CLIENT_KEY:-}
      AUTHNET_SANDBOX:     ${AUTHNET_SANDBOX:-false}
      RAZORPAY_KEY_ID:     ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_CURRENCY:   ${RAZORPAY_CURRENCY:-INR}
    volumes:
      # Product images survive container updates
      - uploads_data:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── MySQL database ────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: eshop_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - db_data:/var/lib/mysql
      # init.sql runs only when the db_data volume is empty (first start)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Certbot (Let's Encrypt auto-renewal) ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: eshop_certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Sleep 12h then try to renew; Nginx reloads automatically via cron (see server setup)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot -w /var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"

volumes:
  db_data:
    name: eshop_db_data
  uploads_data:
    name: eshop_uploads_data
  certbot_www:
    name: eshop_certbot_www
  certbot_conf:
    name: eshop_certbot_conf
